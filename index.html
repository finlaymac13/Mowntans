<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map of Scotland</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f6;
    }

    header {
      background: #005eb8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    #map {
      height: 85vh;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Geographical Map of Scotland</h1>
    <p>Interactive map showing major Scottish locations</p>
  </header>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([56.4907, -4.2026], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const places = [
      ["Edinburgh", 55.9533, -3.1883],
      ["Glasgow", 55.8642, -4.2518],
      ["Aberdeen", 57.1497, -2.0943],
      ["Inverness", 57.4778, -4.2247],
      ["Dundee", 56.4620, -2.9707],
      ["Stirling", 56.1165, -3.9369],
      ["Isle of Skye", 57.5359, -6.2263],
      ["Loch Ness", 57.3229, -4.4244]
    ];

    places.forEach(place => {
      L.marker([place[1], place[2]])
        .addTo(map)
        .bindPopup(`<strong>${place[0]}</strong>`);
    });
  </script>
</body>
</html>
