<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotland Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f6;
    }

    header {
      background: #005eb8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    #map {
      height: 70vh;
      width: 100%;
    }

    .tracker {
      padding: 20px;
      background: white;
    }

    .city {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      font-size: 18px;
    }

    .visited {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Map of Scotland</h1>
    <p>and the mountains in 'em </p>
  </header>

  <div id="map"></div>

  <section class="tracker">
    <h2>Visited Tracker</h2>
    <div id="cityList"></div>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([56.4907, -4.2026], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

const visitedPlaces = JSON.parse(localStorage.getItem("visitedPlaces")) || {};

const places = [
    { name: "Edinburgh", lat: 55.9533, lng: -3.1883 },
    { name: "Glasgow", lat: 55.8642, lng: -4.2518 },
    { name: "Aberdeen", lat: 57.1497, lng: -2.0943 },
    { name: "Inverness", lat: 57.4778, lng: -4.2247 },
    { name: "Dundee", lat: 56.4620, lng: -2.9707 },
    { name: "Stirling", lat: 56.1165, lng: -3.9369 },
    { name: "Perth", lat: 56.3969, lng: -3.4370 },
    { name: "Big Peenitz City", lat: 57.5359, lng: -6.2263 }
];

// Marker Icons
const blueIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

const redIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

const cityList = document.getElementById("cityList");

places.forEach(place => {

    const marker = L.marker(
        [place.lat, place.lng],
        {
            icon: visitedPlaces[place.name] ? redIcon : blueIcon
        }
    ).addTo(map);

    marker.bindPopup(`
        <strong>${place.name}</strong><br>
        <label>
            <input type="checkbox"
                ${visitedPlaces[place.name] ? "checked" : ""}
                onchange="toggleVisited('${place.name}', this.checked)">
            I've visited here
        </label>
    `);

    const div = document.createElement("div");
    div.className = "city";
    div.innerHTML = `
        <input type="checkbox"
            ${visitedPlaces[place.name] ? "checked" : ""}
            onchange="toggleVisited('${place.name}', this.checked)">
        <label style="color:${visitedPlaces[place.name] ? "red" : "black"};font-weight:bold;">
            ${place.name}
        </label>
    `;
    cityList.appendChild(div);
});

function toggleVisited(place, visited) {
    visitedPlaces[place] = visited;
    localStorage.setItem("visitedPlaces", JSON.stringify(visitedPlaces));
    location.reload();
}
</script>
</body>
</html>
